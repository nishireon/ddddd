<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Block Game</title>
<style>
body {
    background:#202325;
    color:#ddd;
    text-align:center;
    font-family:sans-serif;
}

#container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

canvas {
    background:#15181a;
    border:1px solid #555;
}

.side {
    display:flex;
    flex-direction:column;
    gap:10px;
    font-size:14px;
    color:#bbb;
}
</style>
</head>
<body>

<div id="container">
    <div class="side">
        <p>Hold</p>
        <canvas id="hold" width="120" height="120"></canvas>
    </div>

    <canvas id="game" width="300" height="600"></canvas>

    <div class="side">
        <p>Next</p>
        <canvas class="next" width="120" height="120"></canvas>
        <canvas class="next" width="120" height="120"></canvas>
        <canvas class="next" width="120" height="120"></canvas>
    </div>
</div>

<p style="margin-top:10px; font-size:13px; color:#aaa;">
← → 移動 / ↑ 右回転 / ↓ 落下 / Space:ハードドロップ / C:ホールド
</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const holdCtx = document.getElementById("hold").getContext("2d");
const nextCtxs = Array.from(document.querySelectorAll(".next"))
    .map(c=>c.getContext("2d"));

const COLS=10, ROWS=20, BLOCK=30;

let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));

// 🎨 見やすい明るさ
const colors=[
    null,
    "#7fc7c7","#7d8fa8","#c0916f","#d6c27a",
    "#7fbf96","#a487c7","#c77f7f"
];

const pieces=[
[],
[[1,1,1,1]],
[[2,0,0],[2,2,2]],
[[0,0,3],[3,3,3]],
[[4,4],[4,4]],
[[0,5,5],[5,5,0]],
[[0,6,0],[6,6,6]],
[[7,7,0],[0,7,7]]
];

let nextQueue=[];
let holdPiece=null;
let canHold=true;

// 👇 追加：履歴（3連防止）
let history=[];

let player={
    x:3,
    y:0,
    matrix:null,
    type:0,
    rotated:false
};

// 🎯 修正版ランダム（3連禁止）
function randomPiece(){
    let type;
    let attempts = 0;

    do {
        type = Math.floor(Math.random()*7)+1;
        attempts++;

        if(attempts>10) break;

    } while(
        history.length>=2 &&
        history[history.length-1]===type &&
        history[history.length-2]===type
    );

    history.push(type);
    if(history.length>2) history.shift();

    return type;
}

function fillQueue(){
    while(nextQueue.length<3){
        nextQueue.push(randomPiece());
    }
}

function newPiece(){
    fillQueue();
    const type=nextQueue.shift();

    player.matrix=pieces[type];
    player.type=type;
    player.x=3;
    player.y=0;
    player.rotated=false;
    canHold=true;

    fillQueue();
    drawNext();

    if(collide()){
        alert("Game Over");
        board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    }
}

function drawBlock(x,y,color,ctx2=ctx,size=BLOCK,alpha=1){
    ctx2.globalAlpha = alpha;
    ctx2.fillStyle=color;
    ctx2.fillRect(x*size,y*size,size-1,size-1);
    ctx2.globalAlpha = 1;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    board.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v) drawBlock(x,y,colors[v]);
        });
    });

    const ghostY = getGhostY();
    player.matrix.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v){
                drawBlock(player.x+x, ghostY+y, colors[v], ctx, BLOCK, 0.25);
            }
        });
    });

    player.matrix.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v) drawBlock(player.x+x,player.y+y,colors[v]);
        });
    });
}

function getGhostY(){
    let y = player.y;
    while(!collideAt(player.x, y+1, player.matrix)){
        y++;
    }
    return y;
}

function collideAt(px, py, matrix){
    for(let y=0;y<matrix.length;y++){
        for(let x=0;x<matrix[y].length;x++){
            if(matrix[y][x] &&
              (board[py+y] &&
               board[py+y][px+x])!==0){
                return true;
            }
        }
    }
    return false;
}

function drawMini(matrix,ctx2){
    ctx2.clearRect(0,0,120,120);
    matrix.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v) drawBlock(x+1,y+1,colors[v],ctx2,20);
        });
    });
}

function drawNext(){
    nextCtxs.forEach((c,i)=>{
        drawMini(pieces[nextQueue[i]],c);
    });
}

function drawHold(){
    holdCtx.clearRect(0,0,120,120);
    if(holdPiece) drawMini(pieces[holdPiece],holdCtx);
}

function hold(){
    if(!canHold) return;

    if(holdPiece===null){
        holdPiece=player.type;
        newPiece();
    }else{
        [holdPiece, player.type] = [player.type, holdPiece];
        player.matrix = pieces[player.type];
        player.x=3; player.y=0;
    }

    canHold=false;
    drawHold();
}

function merge(){
    player.matrix.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v) board[player.y+y][player.x+x]=v;
        });
    });
}

function collide(){
    return collideAt(player.x, player.y, player.matrix);
}

// 👉 右回転固定
function rotateCW(matrix){
    return matrix[0].map((_,i)=>matrix.map(r=>r[i]).reverse());
}

function playerRotate(){
    const old=player.matrix;
    player.matrix=rotateCW(player.matrix);

    if(collide()) player.matrix=old;
}

function playerDrop(){
    player.y++;
    if(collide()){
        player.y--;
        merge();
        clearLines();
        newPiece();
    }
    dropCounter=0;
}

function hardDrop(){
    player.y = getGhostY();
    merge();
    clearLines();
    newPiece();
}

function move(dir){
    player.x+=dir;
    if(collide()) player.x-=dir;
}

function clearLines(){
    outer: for(let y=ROWS-1;y>=0;y--){
        for(let x=0;x<COLS;x++){
            if(board[y][x]===0) continue outer;
        }
        board.splice(y,1);
        board.unshift(Array(COLS).fill(0));
        y++;
    }
}

document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move(-1);
    else if(e.key==="ArrowRight") move(1);
    else if(e.key==="ArrowDown") playerDrop();
    else if(e.key==="ArrowUp") playerRotate();
    else if(e.key===" ") hardDrop();
    else if(e.key==="c" || e.key==="C") hold();
});

let dropCounter=0,lastTime=0;

function update(time=0){
    const delta=time-lastTime;
    lastTime=time;
    dropCounter+=delta;

    if(dropCounter>1000) playerDrop();

    draw();
    requestAnimationFrame(update);
}

newPiece();
update();
</script>

</body>
</html>
